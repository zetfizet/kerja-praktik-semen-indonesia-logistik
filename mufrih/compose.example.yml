# Example Docker Compose for Airflow
# Copy this file to compose.yml and fill values from your local .env

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:-airflow}@postgres/airflow
  AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY:-change-me}"
  AIRFLOW__API__SECRET_KEY: "${AIRFLOW_SECRET_KEY:-change-me}"
  AIRFLOW_HOME: "/opt/airflow"
  GRAPHHOPPER_API_KEY: "${GRAPHHOPPER_API_KEY:-}"
  GRAPHHOPPER_BASE_URL: "${GRAPHHOPPER_BASE_URL:-https://graphhopper.com/api/1}"
  GRAPHHOPPER_ALLOW_FALLBACK: "${GRAPHHOPPER_ALLOW_FALLBACK:-false}"
  AIRFLOW__TASK_SDK__ENABLED: "false"

services:
  postgres:
    image: docker.io/library/postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-webserver:
    image: docker.io/apache/airflow:3.1.3-python3.13
    container_name: airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    command: >
      bash -c "
      pip install --no-cache-dir psycopg2-binary requests pytz &&
      airflow standalone
      "
    ports:
      - "8080:8080"
    restart: always

  metabase:
    image: docker.io/metabase/metabase:latest
    container_name: metabase
    depends_on:
      - postgres
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: airflow
      MB_DB_PASS: ${POSTGRES_PASSWORD:-airflow}
      MB_DB_HOST: postgres
    ports:
      - "3000:3000"
    volumes:
      - metabase-data:/metabase-data
    restart: always

volumes:
  postgres-data:
  metabase-data:
